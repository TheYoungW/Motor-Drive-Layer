name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpp-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure C++ ABI
        run: cmake -S cpp_damiao -B cpp_damiao/build

      - name: Build C++ ABI
        run: cmake --build cpp_damiao/build

      - name: Run C++ tests
        run: ctest --test-dir cpp_damiao/build --output-on-failure

      - name: Python ABI smoke
        env:
          PYTHONPATH: bindings/python/src
        run: |
          python - <<'PY'
          import motorbridge
          caps = motorbridge.abi_capabilities()
          assert motorbridge.abi_version() == "0.2.0-cpp"
          assert caps["transports"] == ["socketcan", "socketcanfd", "dm-serial", "dm-device"]
          assert caps["vendors"] == ["damiao"]
          print("python-abi-ok")
          PY

      - name: No obsolete source workspace remains
        run: |
          test -z "$(find . -path ./.git -prune -o -name '*.rs' -print)"
