# This file is consumed only by the optional Python hardware tool.
# C++ does not load YAML and does not compile any of these values into the driver.
schema_version: 1

benchmark:
  frequency_hz: 500
  duration_s: 10
  feedback_settle_ms: 300

controllers:
  - name: arm_a
    port: /dev/ttyACM0
    baud: 1000000
    tx_gap_us: 120
    joints:
      - {name: joint1, motor_id: 0x01, feedback_id: 0x201, model: 4340P}
      - {name: joint2, motor_id: 0x02, feedback_id: 0x202, model: 4340P}
      - {name: joint3, motor_id: 0x03, feedback_id: 0x203, model: 4340P}
      - {name: joint4, motor_id: 0x04, feedback_id: 0x204, model: "4310"}
      - {name: joint5, motor_id: 0x05, feedback_id: 0x205, model: "4310"}
      - {name: joint6, motor_id: 0x06, feedback_id: 0x206, model: "4310"}
      - {name: gripper, motor_id: 0x07, feedback_id: 0x207, model: "4310"}

  - name: arm_b
    port: /dev/ttyACM5
    baud: 1000000
    tx_gap_us: 120
    joints:
      - {name: joint1, motor_id: 0x01, feedback_id: 0x201, model: 4340P}
      - {name: joint2, motor_id: 0x02, feedback_id: 0x202, model: 4340P}
      - {name: joint3, motor_id: 0x03, feedback_id: 0x203, model: 4340P}
      - {name: joint4, motor_id: 0x04, feedback_id: 0x204, model: "4310"}
      - {name: joint5, motor_id: 0x05, feedback_id: 0x205, model: "4310"}
      - {name: joint6, motor_id: 0x06, feedback_id: 0x206, model: "4310"}
      - {name: gripper, motor_id: 0x07, feedback_id: 0x207, model: "4310"}
